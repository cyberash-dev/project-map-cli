project:
  name: gitignore-minimal
  language: javascript
  frameworks: []

root: .
respect_gitignore: true

exclude: []

sections:
  - contexts
  - metadata

contexts:
  custom: []
  auto:
    min_files: 1
    depth: 2
    known_roles: {}

entities:
  top_n: 30
  include_fields: true
  include_private_methods: false
  importance:
    method_count: 0.5
    field_count: 0.3
    inbound_references: 1.0

enums:
  base_classes: []

endpoints:
  framework: null
  routes_module: null
  app_var: null

storage:
  base_class: Base
  migrations_dir: null
  last_n: 10

interactions:
  dir: null

workers:
  patterns: []

output:
  markdown: PROJECT_MAP.md
  json: null
